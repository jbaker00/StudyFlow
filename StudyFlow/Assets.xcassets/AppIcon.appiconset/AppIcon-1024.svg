<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: blue-purple -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A6CF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle inner shadow/depth for book pages -->
    <linearGradient id="pageLeftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E8EEF8;stop-opacity:0.90" />
    </linearGradient>
    <linearGradient id="pageRightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EDF1FC;stop-opacity:0.90" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
    </linearGradient>

    <!-- Drop shadow filter for book -->
    <filter id="bookShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1A0A4A" flood-opacity="0.30" />
    </filter>

    <!-- Glow filter for checkmark -->
    <filter id="checkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#22C55E" flood-opacity="0.50" />
    </filter>

    <!-- Clip for rounded square background -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="220" ry="220" />
    </clipPath>
  </defs>

  <!-- Background: rounded square with gradient -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)" />

  <!-- Subtle radial highlight on background -->
  <radialGradient id="bgHighlight" cx="35%" cy="25%" r="60%">
    <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.12" />
    <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.00" />
  </radialGradient>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgHighlight)" />

  <!-- ========== OPEN BOOK ========== -->
  <!-- Book spine (center vertical shadow strip) -->
  <g filter="url(#bookShadow)">

    <!-- LEFT PAGE -->
    <!-- Page body -->
    <path d="
      M 512 310
      C 480 300, 380 295, 230 310
      C 210 312, 195 325, 195 345
      L 195 700
      C 195 720, 210 732, 230 730
      C 380 715, 480 710, 512 720
      Z
    " fill="url(#pageLeftGrad)" />

    <!-- RIGHT PAGE -->
    <path d="
      M 512 310
      C 544 300, 644 295, 794 310
      C 814 312, 829 325, 829 345
      L 829 700
      C 829 720, 814 732, 794 730
      C 644 715, 544 710, 512 720
      Z
    " fill="url(#pageRightGrad)" />

    <!-- Spine center line (subtle crease) -->
    <line x1="512" y1="305" x2="512" y2="725" stroke="#C4CEEF" stroke-width="3" stroke-linecap="round" />

    <!-- Book cover bottom (thickness illusion) -->
    <path d="
      M 195 700 C 195 720, 210 732, 230 730
      C 380 715, 480 710, 512 720
      C 544 710, 644 715, 794 730
      C 814 732, 829 720, 829 700
      L 829 716
      C 829 736, 814 750, 794 748
      C 644 733, 544 728, 512 738
      C 480 728, 380 733, 230 748
      C 210 750, 195 736, 195 716
      Z
    " fill="#C8D3F5" opacity="0.6" />

  </g>

  <!-- ========== TEXT LINES ON LEFT PAGE ========== -->
  <!-- Line 1 -->
  <rect x="240" y="375" width="215" height="14" rx="7" fill="#8FA3D8" opacity="0.55" />
  <!-- Line 2 -->
  <rect x="240" y="410" width="190" height="14" rx="7" fill="#8FA3D8" opacity="0.45" />
  <!-- Line 3 -->
  <rect x="240" y="445" width="210" height="14" rx="7" fill="#8FA3D8" opacity="0.45" />
  <!-- Line 4 -->
  <rect x="240" y="480" width="175" height="14" rx="7" fill="#8FA3D8" opacity="0.40" />
  <!-- Line 5 -->
  <rect x="240" y="515" width="200" height="14" rx="7" fill="#8FA3D8" opacity="0.40" />
  <!-- Line 6 -->
  <rect x="240" y="550" width="160" height="14" rx="7" fill="#8FA3D8" opacity="0.35" />
  <!-- Line 7 -->
  <rect x="240" y="585" width="195" height="14" rx="7" fill="#8FA3D8" opacity="0.35" />
  <!-- Line 8 -->
  <rect x="240" y="620" width="145" height="14" rx="7" fill="#8FA3D8" opacity="0.30" />

  <!-- ========== TEXT LINES ON RIGHT PAGE ========== -->
  <!-- Line 1 -->
  <rect x="569" y="375" width="215" height="14" rx="7" fill="#8FA3D8" opacity="0.55" />
  <!-- Line 2 -->
  <rect x="569" y="410" width="190" height="14" rx="7" fill="#8FA3D8" opacity="0.45" />
  <!-- Line 3 -->
  <rect x="569" y="445" width="210" height="14" rx="7" fill="#8FA3D8" opacity="0.45" />
  <!-- Line 4 -->
  <rect x="569" y="480" width="175" height="14" rx="7" fill="#8FA3D8" opacity="0.40" />

  <!-- ========== GREEN CHECKMARK (right page, lower half) ========== -->
  <!-- Checkmark circle background -->
  <circle cx="686" cy="590" r="95" fill="#16A34A" filter="url(#checkGlow)" />
  <circle cx="686" cy="590" r="95" fill="url(#checkCircleGrad)" />

  <defs>
    <radialGradient id="checkCircleGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#4ADE80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803D;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Checkmark tick mark -->
  <polyline
    points="638,592 672,628 740,552"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

</svg>
